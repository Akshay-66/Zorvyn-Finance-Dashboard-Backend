services:
  db:
    build:
      context: ./db
      dockerfile: Dockerfile
    container_name: finance-dashboard-db
    environment:
      POSTGRES_DB: finance_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d finance_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: finance-dashboard-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_PORT: 8080
      DB_URL: jdbc:postgresql://db:5432/finance_dashboard
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_RETRY_ATTEMPTS: 30
    ports:
      - "8080:8080"
