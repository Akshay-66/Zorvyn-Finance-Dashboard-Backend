<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1400" height="900" fill="#F8FAFC"/>
  <text x="700" y="52" text-anchor="middle" font-size="30" font-family="Segoe UI, Arial, sans-serif" fill="#0F172A" font-weight="700">
    Finance Dashboard Backend - Database Design
  </text>
  <text x="700" y="84" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#475569">
    Main PostgreSQL tables, keys, and important constraints
  </text>

  <rect x="120" y="140" width="470" height="560" rx="22" fill="#E0F2FE" stroke="#0284C7" stroke-width="2"/>
  <text x="355" y="185" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#0C4A6E" font-weight="700">
    users
  </text>
  <line x1="150" y1="210" x2="560" y2="210" stroke="#7DD3FC" stroke-width="2"/>

  <text x="165" y="250" font-size="18" font-family="Consolas, monospace" fill="#0F172A">PK  id UUID</text>
  <text x="165" y="288" font-size="18" font-family="Consolas, monospace" fill="#0F172A">name VARCHAR(100) NOT NULL</text>
  <text x="165" y="326" font-size="18" font-family="Consolas, monospace" fill="#0F172A">email VARCHAR(120) NOT NULL UNIQUE</text>
  <text x="165" y="364" font-size="18" font-family="Consolas, monospace" fill="#0F172A">role VARCHAR(20) NOT NULL</text>
  <text x="165" y="402" font-size="18" font-family="Consolas, monospace" fill="#0F172A">status VARCHAR(20) NOT NULL</text>
  <text x="165" y="440" font-size="18" font-family="Consolas, monospace" fill="#0F172A">auth_token VARCHAR(120) NOT NULL UNIQUE</text>
  <text x="165" y="478" font-size="18" font-family="Consolas, monospace" fill="#0F172A">created_at TIMESTAMP NOT NULL</text>
  <text x="165" y="516" font-size="18" font-family="Consolas, monospace" fill="#0F172A">updated_at TIMESTAMP NOT NULL</text>

  <rect x="165" y="555" width="380" height="115" rx="16" fill="#FFFFFF" stroke="#38BDF8" stroke-width="2"/>
  <text x="355" y="590" text-anchor="middle" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#0F172A" font-weight="700">
    Constraints / Meaning
  </text>
  <text x="190" y="620" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">role in VIEWER, ANALYST, ADMIN</text>
  <text x="190" y="645" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">status in ACTIVE, INACTIVE</text>

  <rect x="810" y="140" width="470" height="620" rx="22" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="1045" y="185" text-anchor="middle" font-size="28" font-family="Segoe UI, Arial, sans-serif" fill="#14532D" font-weight="700">
    financial_records
  </text>
  <line x1="840" y1="210" x2="1250" y2="210" stroke="#86EFAC" stroke-width="2"/>

  <text x="855" y="250" font-size="18" font-family="Consolas, monospace" fill="#0F172A">PK  id UUID</text>
  <text x="855" y="288" font-size="18" font-family="Consolas, monospace" fill="#0F172A">amount NUMERIC(12,2) NOT NULL</text>
  <text x="855" y="326" font-size="18" font-family="Consolas, monospace" fill="#0F172A">type VARCHAR(20) NOT NULL</text>
  <text x="855" y="364" font-size="18" font-family="Consolas, monospace" fill="#0F172A">category VARCHAR(80) NOT NULL</text>
  <text x="855" y="402" font-size="18" font-family="Consolas, monospace" fill="#0F172A">record_date DATE NOT NULL</text>
  <text x="855" y="440" font-size="18" font-family="Consolas, monospace" fill="#0F172A">notes VARCHAR(255)</text>
  <text x="855" y="478" font-size="18" font-family="Consolas, monospace" fill="#0F172A">FK  created_by UUID REFERENCES users(id)</text>
  <text x="855" y="516" font-size="18" font-family="Consolas, monospace" fill="#0F172A">deleted BOOLEAN NOT NULL DEFAULT FALSE</text>
  <text x="855" y="554" font-size="18" font-family="Consolas, monospace" fill="#0F172A">created_at TIMESTAMP NOT NULL</text>
  <text x="855" y="592" font-size="18" font-family="Consolas, monospace" fill="#0F172A">updated_at TIMESTAMP NOT NULL</text>

  <rect x="855" y="625" width="380" height="110" rx="16" fill="#FFFFFF" stroke="#22C55E" stroke-width="2"/>
  <text x="1045" y="660" text-anchor="middle" font-size="17" font-family="Segoe UI, Arial, sans-serif" fill="#0F172A" font-weight="700">
    Constraints / Meaning
  </text>
  <text x="880" y="690" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">amount greater than 0</text>
  <text x="880" y="715" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#334155">type in INCOME, EXPENSE</text>

  <path d="M590 410C660 410 720 410 810 478" stroke="#334155" stroke-width="4" fill="none" marker-end="url(#arrow)"/>
  <text x="700" y="398" text-anchor="middle" font-size="18" font-family="Segoe UI, Arial, sans-serif" fill="#475569" font-weight="700">
    1 User creates many financial records
  </text>

  <rect x="450" y="770" width="500" height="90" rx="18" fill="#FEF3C7" stroke="#D97706" stroke-width="2"/>
  <text x="700" y="808" text-anchor="middle" font-size="20" font-family="Segoe UI, Arial, sans-serif" fill="#92400E" font-weight="700">
    Important Query Use Cases
  </text>
  <text x="700" y="835" text-anchor="middle" font-size="15" font-family="Segoe UI, Arial, sans-serif" fill="#92400E">
    login by token, list users, filter records, summary totals, category totals, recent activity, monthly trends
  </text>
</svg>

